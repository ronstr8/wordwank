apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: {{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}
          ports:
            - containerPort: 11434
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
      initContainers:
        - name: pull-model
          image: curlimages/curl:latest
          command:
            - "sh"
            - "-c"
            - |
              # Wait for ollama to be ready
              until curl -s http://localhost:11434/api/tags > /dev/null; do
                echo "Waiting for ollama..."
                sleep 5
              done
              echo "Pulling model {{ .Values.ollama.model | default "phi3:mini" }}..."
              curl -X POST http://localhost:11434/api/pull -d "{\"name\": \"{{ .Values.ollama.model | default "phi3:mini" }}\"}"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: ollama
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434
  type: {{ .Values.ollama.service.type }}
